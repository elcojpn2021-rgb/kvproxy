<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVデータ一覧</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { text-align: center; color: #2c3e50; font-size: 20px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  h2 { font-size: 15px; color: #555; margin: 0 0 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
  input, select { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
  button:hover { background: #2980b9; }
  button:disabled { background: #bdc3c7; cursor: not-allowed; }
  .btn-green { background: #27ae60; }
  .btn-green:hover { background: #219a52; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  th { background: #f5f5f5; padding: 8px 6px; text-align: left; border-bottom: 2px solid #ddd; color: #555; }
  td { padding: 8px 6px; border-bottom: 1px solid #eee; vertical-align: top; word-break: break-all; }
  tr:hover { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .badge-green { background: #eafaf1; color: #1a5e35; }
  .badge-red { background: #fdf2f2; color: #922b21; }
  .badge-blue { background: #eaf4fd; color: #1a4e8c; }
  .mono { font-family: monospace; font-size: 11px; }
  .summary { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .summary-item { background: #f8f9fa; border-radius: 8px; padding: 10px; flex: 1; min-width: 80px; text-align: center; }
  .summary-item .num { font-size: 22px; font-weight: bold; color: #2c3e50; }
  .summary-item .lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .empty { text-align: center; color: #aaa; padding: 20px; }
  .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; min-height: 20px; }
  .tip { font-size: 11px; color: #888; margin-bottom: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 KVデータ一覧ツール</h1>

  <div class="card">
    <h2>⚙️ 設定</h2>
    <p class="tip">※ APIトークンはCloudflare → マイプロフィール → APIトークン から取得できます。</p>
    <label>APIトークン</label>
    <input type="password" id="apiToken" placeholder="Cloudflare APIトークン" />
    <label>表示するデータ</label>
    <select id="dataType">
      <option value="coupon">クーポン一覧（coupon:プレフィックス）</option>
      <option value="key">アクセスキー一覧（key:プレフィックス）</option>
      <option value="all">すべて</option>
    </select>
    <button id="btnLoad" onclick="loadData()">データを取得する</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card" id="couponCard" style="display:none;">
    <h2>🎟️ クーポン一覧</h2>
    <div class="summary" id="couponSummary"></div>
    <div id="couponTable"></div>
    <button class="btn-green" onclick="exportCSV('coupon')" style="margin-top:12px;">CSVエクスポート</button>
  </div>

  <div class="card" id="keyCard" style="display:none;">
    <h2>🔑 アクセスキー一覧</h2>
    <div class="summary" id="keySummary"></div>
    <div id="keyTable"></div>
    <button class="btn-green" onclick="exportCSV('key')" style="margin-top:12px;">CSVエクスポート</button>
  </div>
</div>

<script>
  const PROXY_URL = 'https://kv-proxy.elcojpn2021.workers.dev';
  const ACCOUNT_ID = '53a52c2dc176814fd582dccb2f6a316d';
  const NAMESPACE_ID = 'bc75cdb1e5c04eb4b55efa46cde95c67';

  let couponData = [];
  let keyData = [];

  function getToken() { return document.getElementById('apiToken').value.trim(); }

  async function cfFetch(path) {
    const res = await fetch(`${PROXY_URL}?path=${encodeURIComponent(path)}`, {
      headers: {
        'X-CF-Token': getToken(),
        'X-Account-Id': ACCOUNT_ID,
        'X-Namespace-Id': NAMESPACE_ID,
      }
    });
    return res.json();
  }

  async function getValue(key) {
    const path = `/values/${encodeURIComponent(key)}`;
    const res = await fetch(`${PROXY_URL}?path=${encodeURIComponent(path)}`, {
      headers: {
        'X-CF-Token': getToken(),
        'X-Account-Id': ACCOUNT_ID,
        'X-Namespace-Id': NAMESPACE_ID,
      }
    });
    const text = await res.text();
    try { return JSON.parse(text); } catch { return text; }
  }

  async function listKeys(prefix) {
    const path = `/keys?prefix=${encodeURIComponent(prefix)}&limit=1000`;
    const data = await cfFetch(path);
    if (!data.success) throw new Error(data.errors?.[0]?.message || 'KV取得エラー');
    return data.result;
  }

  async function loadData() {
    const token = getToken();
    if (!token) {
      showError('APIトークンを入力してください。');
      return;
    }
    showError('');
    document.getElementById('btnLoad').disabled = true;
    document.getElementById('btnLoad').textContent = '取得中...';

    const type = document.getElementById('dataType').value;

    try {
      if (type === 'coupon' || type === 'all') await loadCoupons();
      if (type === 'key' || type === 'all') await loadKeys2();
    } catch (e) {
      showError('エラー: ' + e.message);
    } finally {
      document.getElementById('btnLoad').disabled = false;
      document.getElementById('btnLoad').textContent = 'データを取得する';
    }
  }

  async function loadCoupons() {
    const keys = await listKeys('coupon:');
    couponData = [];
    for (const k of keys) {
      const val = await getValue(k.name);
      const couponCode = k.name.replace('coupon:', '');
      let remaining = null;
      if (val.accessKey) {
        try {
          const keyVal = await getValue(`key:${val.accessKey}`);
          remaining = (keyVal.limit || 10) - (keyVal.count || 0);
        } catch (_) {}
      }
      couponData.push({
        coupon: couponCode,
        created: val.created || '不明',
        used: val.used || false,
        usedAt: val.usedAt || null,
        accessKey: val.accessKey || null,
        remaining
      });
    }
    couponData.sort((a, b) => b.created.localeCompare(a.created));
    renderCouponTable(couponData);
    document.getElementById('couponCard').style.display = 'block';
  }

  async function loadKeys2() {
    const keys = await listKeys('key:');
    keyData = [];
    for (const k of keys) {
      const val = await getValue(k.name);
      keyData.push({
        accessKey: k.name.replace('key:', ''),
        issued: val.issued || '不明',
        count: val.count || 0,
        remaining: (val.limit || 10) - (val.count || 0),
        coupon: val.coupon || null
      });
    }
    keyData.sort((a, b) => b.issued.localeCompare(a.issued));
    renderKeyTable(keyData);
    document.getElementById('keyCard').style.display = 'block';
  }

  function renderCouponTable(list) {
    const used = list.filter(i => i.used).length;
    const unused = list.filter(i => !i.used).length;
    document.getElementById('couponSummary').innerHTML = `
      <div class="summary-item"><div class="num">${list.length}</div><div class="lbl">合計</div></div>
      <div class="summary-item"><div class="num" style="color:#27ae60;">${unused}</div><div class="lbl">未使用</div></div>
      <div class="summary-item"><div class="num" style="color:#e74c3c;">${used}</div><div class="lbl">使用済</div></div>
    `;
    if (list.length === 0) { document.getElementById('couponTable').innerHTML = '<div class="empty">データなし</div>'; return; }
    let html = `<table><tr><th>クーポン</th><th>発行日</th><th>状態</th><th>使用日</th><th>残回数</th></tr>`;
    list.forEach(i => {
      const badge = i.used ? '<span class="badge badge-red">使用済</span>' : '<span class="badge badge-green">未使用</span>';
      html += `<tr><td class="mono">${i.coupon}</td><td>${i.created}</td><td>${badge}</td><td>${i.usedAt||'-'}</td><td style="text-align:center;">${i.remaining!==null?i.remaining+' 回':'-'}</td></tr>`;
    });
    document.getElementById('couponTable').innerHTML = html + '</table>';
  }

  function renderKeyTable(list) {
    const active = list.filter(i => i.remaining > 0).length;
    const exhausted = list.filter(i => i.remaining <= 0).length;
    document.getElementById('keySummary').innerHTML = `
      <div class="summary-item"><div class="num">${list.length}</div><div class="lbl">合計</div></div>
      <div class="summary-item"><div class="num" style="color:#27ae60;">${active}</div><div class="lbl">利用中</div></div>
      <div class="summary-item"><div class="num" style="color:#e74c3c;">${exhausted}</div><div class="lbl">使い切り</div></div>
    `;
    if (list.length === 0) { document.getElementById('keyTable').innerHTML = '<div class="empty">データなし</div>'; return; }
    let html = `<table><tr><th>アクセスキー</th><th>発行日</th><th>使用</th><th>残り</th><th>状態</th></tr>`;
    list.forEach(i => {
      const badge = i.remaining > 0 ? '<span class="badge badge-blue">利用中</span>' : '<span class="badge badge-red">使い切り</span>';
      html += `<tr><td class="mono">${i.accessKey}</td><td>${i.issued}</td><td style="text-align:center;">${i.count}回</td><td style="text-align:center;font-weight:bold;">${i.remaining}回</td><td>${badge}</td></tr>`;
    });
    document.getElementById('keyTable').innerHTML = html + '</table>';
  }

  function exportCSV(type) {
    let csv = '', filename = '';
    if (type === 'coupon') {
      csv = '\uFEFFクーポンコード,発行日,状態,使用日,残回数\n';
      couponData.forEach(i => { csv += `${i.coupon},${i.created},${i.used?'使用済':'未使用'},${i.usedAt||''},${i.remaining!==null?i.remaining:''}\n`; });
      filename = 'coupon_list.csv';
    } else {
      csv = '\uFEFFアクセスキー,発行日,使用回数,残回数\n';
      keyData.forEach(i => { csv += `${i.accessKey},${i.issued},${i.count},${i.remaining}\n`; });
      filename = 'key_list.csv';
    }
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
  }

  function showError(msg) { document.getElementById('errorMsg').textContent = msg; }
</script>
</body>
</html>
